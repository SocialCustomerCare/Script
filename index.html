<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCRIPT — Supporto Tecnico</title>
  <style>
    /* =====================================================================
       Design tokens
    ===================================================================== */
    :root {
      --bg:           #f5f7fa;
      --bg-elev:      #ffffff;
      --bg-sidebar:   #1e2530;
      --bg-sidebar-2: #161c25;
      --text:         #1a1f2e;
      --text-dim:     #5a6478;
      --text-side:    #d4d9e1;
      --text-side-2:  #8e96a5;
      --accent:       #4c8bf5;
      --accent-2:     #6ba0ff;
      --border:       #e4e8ef;
      --border-side:  #2a3340;
      --hover-side:   #2a3340;
      --active-side:  #4c8bf5;
      --shadow:       0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --radius:       8px;
      --radius-sm:    6px;
      --sidebar-w:    280px;
    }
    [data-theme="dark"] {
      --bg:           #0f1419;
      --bg-elev:      #1a1f2a;
      --bg-sidebar:   #0a0e14;
      --bg-sidebar-2: #060a10;
      --text:         #e4e8ef;
      --text-dim:     #8a93a3;
      --border:       #2a3340;
    }

    /* =====================================================================
       Reset & base
    ===================================================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input { font: inherit; }

    /* =====================================================================
       App layout
    ===================================================================== */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }
    .app.sidebar-collapsed { grid-template-columns: 0 1fr; }

    /* =====================================================================
       Sidebar
    ===================================================================== */
    .sidebar {
      background: var(--bg-sidebar);
      color: var(--text-side);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-side);
      overflow: hidden;
      transition: width .2s ease;
    }
    .sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border-side);
      background: var(--bg-sidebar-2);
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header h1::before {
      content: ""; width: 8px; height: 8px; border-radius: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .sidebar-header .subtitle {
      font-size: 11px;
      color: var(--text-side-2);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .search-box {
      padding: 12px;
      border-bottom: 1px solid var(--border-side);
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      background: var(--bg-sidebar-2);
      border: 1px solid var(--border-side);
      border-radius: var(--radius-sm);
      color: var(--text-side);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e96a5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
      background-repeat: no-repeat;
      background-position: 9px center;
      background-size: 14px;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-side-2); }

    .nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 12px;
    }
    .nav::-webkit-scrollbar { width: 6px; }
    .nav::-webkit-scrollbar-thumb { background: var(--border-side); border-radius: 3px; }

    .category {
      padding: 12px 20px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-side-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .category .count {
      background: var(--bg-sidebar-2);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      color: var(--text-side);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
      font-size: 13px;
      user-select: none;
    }
    .nav-item:hover { background: var(--hover-side); }
    .nav-item.active {
      background: var(--hover-side);
      border-left-color: var(--accent);
      color: #fff;
    }
    .nav-item .icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .nav-item .label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-empty {
      padding: 20px;
      text-align: center;
      color: var(--text-side-2);
      font-size: 12px;
      font-style: italic;
    }

    .sidebar-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border-side);
      background: var(--bg-sidebar-2);
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sidebar-footer button {
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      color: var(--text-side-2);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .12s, color .12s;
    }
    .sidebar-footer button:hover { background: var(--hover-side); color: var(--text-side); }
    .sidebar-footer .spacer { flex: 1; }

    /* =====================================================================
       Main area
    ===================================================================== */
    .main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      z-index: 1;
    }
    .topbar .toggle-btn {
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      transition: background .12s;
    }
    .topbar .toggle-btn:hover { background: var(--bg); color: var(--text); }
    .topbar .crumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .topbar .crumb strong { color: var(--text); font-weight: 600; }
    .topbar .crumb .sep { color: var(--border); }
    .topbar .actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }
    .topbar .actions button {
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .12s, color .12s;
    }
    .topbar .actions button:hover { background: var(--bg); color: var(--text); }
    .topbar .actions button:disabled { opacity: .35; cursor: not-allowed; }

    .content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg-elev);
      display: block;
    }
    .frame.hidden { display: none; }

    /* =====================================================================
       Welcome screen
    ===================================================================== */
    .welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow-y: auto;
    }
    .welcome.hidden { display: none; }
    .welcome-inner {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }
    .welcome h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .welcome .lead {
      color: var(--text-dim);
      margin-bottom: 32px;
      font-size: 15px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 24px;
      text-align: left;
    }
    .card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: transform .12s, border-color .12s, box-shadow .12s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(76,139,245,.15);
    }
    .card .card-icon { font-size: 24px; margin-bottom: 8px; }
    .card .card-name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card .card-desc {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.4;
    }
    .card .card-cat {
      display: inline-block;
      margin-top: 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--accent);
      font-weight: 600;
    }
    .welcome-section-title {
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-weight: 600;
      margin: 24px 0 0;
    }

    /* =====================================================================
       Responsive
    ===================================================================== */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; top: 0; left: 0;
        width: var(--sidebar-w); height: 100%;
        transform: translateX(-100%);
        transition: transform .2s ease;
        z-index: 10;
      }
      .app:not(.sidebar-collapsed) .sidebar { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- ============================================================== -->
    <!-- Sidebar                                                          -->
    <!-- ============================================================== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>SCRIPT</h1>
        <div class="subtitle">Supporto Tecnico</div>
      </div>

      <div class="search-box">
        <input
          type="text"
          id="search"
          placeholder="Cerca uno script…"
          autocomplete="off"
          spellcheck="false">
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-footer">
        <button id="home-btn" title="Home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </button>
        <div class="spacer"></div>
        <button id="theme-btn" title="Cambia tema">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </aside>

    <!-- ============================================================== -->
    <!-- Main                                                             -->
    <!-- ============================================================== -->
    <main class="main">
      <div class="topbar">
        <button class="toggle-btn" id="toggle-sidebar" title="Mostra/nascondi menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="crumb">
          <span>SCRIPT</span>
          <span class="sep" id="crumb-sep" style="display:none">/</span>
          <strong id="crumb-current"></strong>
        </div>
        <div class="actions">
          <button id="reload-btn" disabled title="Ricarica script">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
            Ricarica
          </button>
          <button id="open-new-btn" disabled title="Apri in nuova finestra">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
            Apri
          </button>
        </div>
      </div>

      <div class="content">
        <iframe id="frame" class="frame hidden" sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals allow-same-origin allow-downloads" title="Script attivo"></iframe>
        <section class="welcome" id="welcome">
          <div class="welcome-inner">
            <h2>Benvenuto in SCRIPT</h2>
            <p class="lead">Strumenti operativi per il team di supporto tecnico. Seleziona uno script dal menu a sinistra o cliccane uno qui sotto.</p>

            <div class="welcome-section-title" id="recent-title" style="display:none">Recenti</div>
            <div class="cards" id="recent-cards"></div>

            <div class="welcome-section-title">Tutti gli script</div>
            <div class="cards" id="all-cards"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Registro degli script (esterno per facilitare la manutenzione) -->
  <script src="scripts.js"></script>

  <script>
    /* =====================================================================
       SCRIPT - Container logic
       Vanilla JS. Nessuna dipendenza esterna.
    ===================================================================== */
    (function () {
      'use strict';

      // ---------------------------------------------------------------
      // Config / state
      // ---------------------------------------------------------------
      const MANIFEST = Array.isArray(window.SCRIPTS_MANIFEST) ? window.SCRIPTS_MANIFEST : [];
      const LS_THEME  = 'script.theme';
      const LS_RECENT = 'script.recent';
      const MAX_RECENT = 6;

      const state = {
        current: null,         // id dello script attivo
        filter: '',            // testo ricerca
        sidebarCollapsed: false
      };

      // ---------------------------------------------------------------
      // DOM refs
      // ---------------------------------------------------------------
      const $ = (id) => document.getElementById(id);
      const refs = {
        app:         $('app'),
        nav:         $('nav'),
        search:      $('search'),
        frame:       $('frame'),
        welcome:     $('welcome'),
        crumbCur:    $('crumb-current'),
        crumbSep:    $('crumb-sep'),
        reloadBtn:   $('reload-btn'),
        openNewBtn:  $('open-new-btn'),
        toggleBtn:   $('toggle-sidebar'),
        themeBtn:    $('theme-btn'),
        themeIcon:   $('theme-icon'),
        homeBtn:     $('home-btn'),
        recentTitle: $('recent-title'),
        recentCards: $('recent-cards'),
        allCards:    $('all-cards')
      };

      // ---------------------------------------------------------------
      // Helpers
      // ---------------------------------------------------------------
      function byId(id) { return MANIFEST.find(s => s.id === id) || null; }

      function getRecent() {
        try {
          const raw = localStorage.getItem(LS_RECENT);
          if (!raw) return [];
          const ids = JSON.parse(raw);
          return Array.isArray(ids) ? ids.filter(byId) : [];
        } catch { return []; }
      }
      function pushRecent(id) {
        const cur = getRecent().filter(x => x !== id);
        cur.unshift(id);
        localStorage.setItem(LS_RECENT, JSON.stringify(cur.slice(0, MAX_RECENT)));
      }

      function matchesFilter(script, q) {
        if (!q) return true;
        const haystack = [
          script.name, script.description, script.category,
          ...(script.tags || [])
        ].filter(Boolean).join(' ').toLowerCase();
        return q.split(/\s+/).every(tok => haystack.includes(tok));
      }

      // ---------------------------------------------------------------
      // Rendering: sidebar nav
      // ---------------------------------------------------------------
      function renderNav() {
        const q = state.filter.trim().toLowerCase();
        const filtered = MANIFEST.filter(s => matchesFilter(s, q));

        // raggruppa per categoria
        const groups = {};
        filtered.forEach(s => {
          const cat = s.category || 'Altro';
          (groups[cat] = groups[cat] || []).push(s);
        });

        refs.nav.innerHTML = '';

        if (filtered.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'nav-empty';
          empty.textContent = q
            ? 'Nessuno script corrisponde a "' + q + '"'
            : 'Nessuno script registrato.';
          refs.nav.appendChild(empty);
          return;
        }

        Object.keys(groups).sort().forEach(cat => {
          const items = groups[cat];

          const header = document.createElement('div');
          header.className = 'category';
          header.innerHTML = '<span>' + escapeHtml(cat) + '</span><span class="count">' + items.length + '</span>';
          refs.nav.appendChild(header);

          items.forEach(s => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            if (s.id === state.current) item.classList.add('active');
            item.dataset.id = s.id;
            item.innerHTML =
              '<span class="icon">' + (s.icon || '📄') + '</span>' +
              '<span class="label">' + escapeHtml(s.name) + '</span>';
            item.title = s.description || s.name;
            item.addEventListener('click', () => navigateTo(s.id));
            refs.nav.appendChild(item);
          });
        });
      }

      // ---------------------------------------------------------------
      // Rendering: welcome cards
      // ---------------------------------------------------------------
      function renderCards() {
        // recenti
        const recent = getRecent().map(byId).filter(Boolean);
        if (recent.length > 0) {
          refs.recentTitle.style.display = '';
          refs.recentCards.innerHTML = recent.map(cardHtml).join('');
        } else {
          refs.recentTitle.style.display = 'none';
          refs.recentCards.innerHTML = '';
        }
        // tutti
        refs.allCards.innerHTML = MANIFEST.map(cardHtml).join('') ||
          '<div style="color:var(--text-dim);grid-column:1/-1;text-align:center">Nessuno script registrato. Modifica <code>scripts.js</code> per aggiungerne.</div>';

        // bind click
        document.querySelectorAll('.card[data-id]').forEach(el => {
          el.addEventListener('click', () => navigateTo(el.dataset.id));
        });
      }

      function cardHtml(s) {
        return (
          '<div class="card" data-id="' + escapeAttr(s.id) + '">' +
            '<div class="card-icon">' + (s.icon || '📄') + '</div>' +
            '<div class="card-name">' + escapeHtml(s.name) + '</div>' +
            '<div class="card-desc">' + escapeHtml(s.description || '') + '</div>' +
            '<div class="card-cat">' + escapeHtml(s.category || '') + '</div>' +
          '</div>'
        );
      }

      // ---------------------------------------------------------------
      // Navigazione
      // ---------------------------------------------------------------
      function navigateTo(id) {
        const target = id ? byId(id) : null;

        if (!target) {
          // home
          state.current = null;
          refs.frame.src = 'about:blank';
          refs.frame.classList.add('hidden');
          refs.welcome.classList.remove('hidden');
          refs.crumbCur.textContent = '';
          refs.crumbSep.style.display = 'none';
          refs.reloadBtn.disabled = true;
          refs.openNewBtn.disabled = true;
          if (location.hash) {
            history.replaceState(null, '', location.pathname + location.search);
          }
          document.title = 'SCRIPT — Supporto Tecnico';
          renderNav();
          renderCards();
          return;
        }

        state.current = id;
        refs.frame.src = target.path;
        refs.frame.classList.remove('hidden');
        refs.welcome.classList.add('hidden');
        refs.crumbCur.textContent = target.name;
        refs.crumbSep.style.display = '';
        refs.reloadBtn.disabled = false;
        refs.openNewBtn.disabled = false;
        document.title = target.name + ' — SCRIPT';
        if (location.hash !== '#' + id) {
          history.pushState({ id }, '', '#' + id);
        }
        pushRecent(id);
        renderNav();
      }

      // ---------------------------------------------------------------
      // Tema
      // ---------------------------------------------------------------
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        refs.themeIcon.textContent = t === 'dark' ? '☀️' : '🌙';
      }
      function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        const next = cur === 'dark' ? 'light' : 'dark';
        localStorage.setItem(LS_THEME, next);
        applyTheme(next);
      }
      function initTheme() {
        const saved = localStorage.getItem(LS_THEME);
        if (saved === 'dark' || saved === 'light') applyTheme(saved);
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
        else applyTheme('light');
      }

      // ---------------------------------------------------------------
      // Sidebar toggle
      // ---------------------------------------------------------------
      function toggleSidebar() {
        state.sidebarCollapsed = !state.sidebarCollapsed;
        refs.app.classList.toggle('sidebar-collapsed', state.sidebarCollapsed);
      }

      // ---------------------------------------------------------------
      // Utils
      // ---------------------------------------------------------------
      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function escapeAttr(s) { return escapeHtml(s); }

      // ---------------------------------------------------------------
      // Event bindings
      // ---------------------------------------------------------------
      refs.search.addEventListener('input', (e) => {
        state.filter = e.target.value;
        renderNav();
      });
      refs.themeBtn.addEventListener('click', toggleTheme);
      refs.toggleBtn.addEventListener('click', toggleSidebar);
      refs.homeBtn.addEventListener('click', () => navigateTo(null));
      refs.reloadBtn.addEventListener('click', () => {
        if (state.current) {
          // forza reload del contenuto dell'iframe
          refs.frame.src = refs.frame.src;
        }
      });
      refs.openNewBtn.addEventListener('click', () => {
        const s = byId(state.current);
        if (s) window.open(s.path, '_blank', 'noopener');
      });
      window.addEventListener('hashchange', () => {
        const id = location.hash.replace(/^#/, '');
        if (id !== (state.current || '')) navigateTo(id || null);
      });
      // Keyboard: "/" focuses search, Esc -> home
      window.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== refs.search) {
          e.preventDefault(); refs.search.focus();
        } else if (e.key === 'Escape' && document.activeElement === refs.search) {
          refs.search.value = ''; state.filter = ''; renderNav(); refs.search.blur();
        }
      });

      // ---------------------------------------------------------------
      // Boot
      // ---------------------------------------------------------------
      initTheme();
      renderNav();
      renderCards();

      // Avvio: leggi hash dall'URL
      const initialId = location.hash.replace(/^#/, '');
      if (initialId && byId(initialId)) {
        navigateTo(initialId);
      }
    })();
  </script>
</body>
